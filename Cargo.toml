[package]
name = "recall-echo"
version = "3.0.0"
edition = "2021"
description = "Persistent memory system with knowledge graph — for any LLM tool"
license = "AGPL-3.0-only"
repository = "https://github.com/dnacenta/recall-echo"
keywords = ["ai", "memory", "llm", "conversation", "knowledge-graph"]
categories = ["command-line-utilities"]
authors = ["dnacenta"]

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
dirs = "6"

# Graph (default) — knowledge graph with SurrealDB + fastembed
recall-graph = { git = "https://github.com/dnacenta/recall-graph", branch = "main", optional = true }
tokio = { version = "1", features = ["rt-multi-thread", "process", "io-util"], optional = true }

# LLM HTTP provider (optional) — for entity extraction via Anthropic/OpenAI-compat APIs
reqwest = { version = "0.12", features = ["json"], optional = true }
async-trait = { version = "0.1", optional = true }

# Pulse-null integration (optional) — plugin system for pulse-null entities
echo-system-types = { git = "https://github.com/dnacenta/echo-system-types", branch = "main", optional = true }

[features]
default = ["graph"]
graph = ["recall-graph", "tokio"]
llm = ["graph", "reqwest", "async-trait"]
pulse-null = ["echo-system-types", "async-trait"]

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["rt", "macros"] }
