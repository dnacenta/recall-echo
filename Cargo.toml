[package]
name = "recall-echo"
version = "2.0.0"
edition = "2021"
description = "Persistent three-layer memory system for pulse-null entities"
license = "AGPL-3.0-only"
repository = "https://github.com/dnacenta/recall-echo"
keywords = ["pulse-null", "ai", "memory", "llm", "conversation"]
categories = ["command-line-utilities"]
authors = ["dnacenta"]

[dependencies]
echo-system-types = { git = "https://github.com/dnacenta/echo-system-types", branch = "main" }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "6"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["rt", "macros"] }
